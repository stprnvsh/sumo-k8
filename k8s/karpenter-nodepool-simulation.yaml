apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: simulation-nodes
spec:
  disruption:
    # Keep the existing behavior: scale back down when empty.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 60s
    expireAfter: 12h
    budgets:
    - nodes: 10%
  limits:
    cpu: "6000"
    memory: 6000Gi
  template:
    metadata:
      labels:
        node-type: simulation
        workload-type: simulation
    spec:
      nodeClassRef:
        name: simulation-nodeclass
      requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["on-demand"]
      # Prefer broad instance selection so Karpenter can pick anything available.
      # These constraints keep nodes "big enough" for 16 CPU / 32Gi pods even
      # after daemonset + kube/system reservations.
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["c", "m", "r"]
      - key: karpenter.k8s.aws/instance-generation
        operator: Gt
        values: ["5"]
      # Pods requesting 32 CPUs need allocatable > 32; 8xlarge (32 vCPU) leaves ~31.85m allocatable.
      # Require AWS vCPU > 32 so new nodes are at least ~48 vCPU (e.g. 12xlarge class).
      - key: karpenter.k8s.aws/instance-cpu
        operator: Gt
        values: ["32"]
      - key: karpenter.k8s.aws/instance-size
        operator: In
        values: ["4xlarge", "8xlarge", "9xlarge", "12xlarge", "16xlarge"]
