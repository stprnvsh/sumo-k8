apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-dashboard-api
  namespace: sumo-k8
  labels:
    app.kubernetes.io/name: queue-dashboard-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-dashboard-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue-dashboard-api
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: infrastructure-nodes
        topology.kubernetes.io/zone: eu-central-2a
      containers:
      - name: api
        image: 154794777636.dkr.ecr.eu-central-2.amazonaws.com/queue-dashboard-api:queue-dashboard-20260330153330-amd64
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sumo-k8-secrets
              key: DATABASE_URL
        - name: CACHE_TTL_SECONDS
          value: "5"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /stats
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /stats
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2

