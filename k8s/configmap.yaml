apiVersion: v1
kind: ConfigMap
metadata:
  name: sumo-k8-config
  namespace: sumo-k8
data:
  LOG_LEVEL: "INFO"
  MAX_FILE_SIZE_MB: "2000"
  MAX_JOB_DURATION_HOURS: "12"
  CONFIGMAP_CLEANUP_DELAY_SECONDS: "300"
  MAX_CONCURRENT_JOBS_PER_TENANT: "100"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DEFAULT_MAX_CPU: "32"
  DEFAULT_MAX_MEMORY_GI: "128"
  SIMULATION_NODE_SELECTOR_KEY: "node-type"
  SIMULATION_NODE_SELECTOR_VALUES: "simulation"
  CORS_ORIGINS: "*"
  # Admin key for warmup/scaling endpoints
  ADMIN_KEY: "admin-75b4c6ed101a0d11b5efd8953c521cb87a17875ccbf77395911321a005855a68"
  # SUMO simulation image with Parquet/Arrow support and boto3
  SUMO_IMAGE: "154794777636.dkr.ecr.eu-central-2.amazonaws.com/sumo-batch:slim"
  # Result storage - direct S3 upload from job
  RESULT_STORAGE_TYPE: "s3"
  S3_BUCKET: "transcality-simulations"
  S3_REGION: "eu-central-2"
  CLOUDWATCH_SIM_LOG_GROUP: "/sumo-k8/simulations"
  # Background workers
  ENABLE_RECONCILER: "true"
  ENABLE_CONFIGMAP_CLEANUP: "true"
  # Guarded legacy cleanup for old chunk ConfigMaps
  ENABLE_LEGACY_CONFIGMAP_SWEEPER: "true"
  LEGACY_CONFIGMAP_SWEEPER_NAMESPACES: "transcality"
  LEGACY_CONFIGMAP_SWEEPER_PREFIX: "sumo-"
  LEGACY_CONFIGMAP_SWEEPER_NAME_CONTAINS: "-chunk"
  LEGACY_CONFIGMAP_SWEEPER_MIN_AGE_HOURS: "6"
  LEGACY_CONFIGMAP_SWEEPER_MAX_DELETES_PER_RUN: "1000"
  # IAM role for IRSA - simulation pods use this for S3 access
  S3_IAM_ROLE_ARN: "arn:aws:iam::154794777636:role/sumo-k8-simulation-s3"

