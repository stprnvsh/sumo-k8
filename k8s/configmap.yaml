apiVersion: v1
kind: ConfigMap
metadata:
  name: sumo-k8-config
  namespace: sumo-k8
data:
  LOG_LEVEL: "INFO"
  MAX_FILE_SIZE_MB: "100"
  MAX_JOB_DURATION_HOURS: "24"
  CONFIGMAP_CLEANUP_DELAY_SECONDS: "300"
  MAX_CONCURRENT_JOBS_PER_TENANT: "10"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  CORS_ORIGINS: "*"
  # Admin key for warmup/scaling endpoints
  ADMIN_KEY: "admin-75b4c6ed101a0d11b5efd8953c521cb87a17875ccbf77395911321a005855a68"
  # SUMO simulation image with Parquet/Arrow support
  SUMO_IMAGE: "154794777636.dkr.ecr.eu-central-2.amazonaws.com/sumo-batch:parquet"
  # Result storage - use S3 for results
  RESULT_STORAGE_TYPE: "s3"
  S3_BUCKET: "transcality-simulations"
  S3_REGION: "eu-central-2"

