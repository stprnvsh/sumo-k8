apiVersion: apps/v1
kind: Deployment
metadata:
  name: sumo-k8-controller
  namespace: sumo-k8
  labels:
    app: sumo-k8-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sumo-k8-controller
  template:
    metadata:
      labels:
        app: sumo-k8-controller
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: infrastructure-nodes
      serviceAccountName: sumo-k8-controller
      containers:
      - name: app
        image: 154794777636.dkr.ecr.eu-central-2.amazonaws.com/sumo-k8-controller:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sumo-k8-secrets
              key: DATABASE_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: sumo-k8-secrets
              key: AWS_ACCESS_KEY_ID
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: sumo-k8-secrets
              key: AWS_SECRET_ACCESS_KEY
              optional: true
        envFrom:
        - configMapRef:
            name: sumo-k8-config
        resources:
          requests:
            cpu: "250m"
            memory: "4Gi"
          limits:
            cpu: "1"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5

